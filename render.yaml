services:
  - type: web
    name: hive-attest-agentic-volume
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SPECTRAL_PRIVKEY_B64
        sync: false
      - key: SPECTRAL_PUBKEY_B64
        sync: false
